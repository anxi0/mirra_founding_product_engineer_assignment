name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_PyKdOowssUkdwVgaLZInE6EG
          VERCEL_PROJECT_ID: prj_vMLEs5TAt96uzY6trp88Rp7a9Itx
